<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Counseling Session</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Book a Counseling Session</h2>

<div class="counselor-card">
  <img src="https://via.placeholder.com/120" alt="Counselor Photo">
  <h3>Dr. Ananya Sharma</h3>
  <p>Clinical Counselor</p>

  <label>Select Slot:</label>
  <select id="slot">
    <option value="">-- Select --</option>
    <option>10:00 AM - 10:30 AM</option>
    <option>11:00 AM - 11:30 AM</option>
    <option>2:00 PM - 2:30 PM</option>
  </select>

  <button onclick="bookSession()">Request Booking</button>
</div>

<p id="message"></p>

<script src="script.js"></script>
</body>
</html>
